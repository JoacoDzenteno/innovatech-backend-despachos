version: '3.8'

services:
  db-innovatech:
    image: mysql:8.0
    container_name: db-innovatech-user1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: innovadb
    ports:
      - "3315:3306"
    volumes:
      - db_data_innovatech:/var/lib/mysql

  back-despachos:
    image: innovatech-backend-despachos:latest
    container_name: back-despachos-user1
    ports:
      - "8091:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-innovatech:3306/innovadb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - db-innovatech

  back-ventas:
    image: innovatech-backend-ventas:latest
    container_name: back-ventas-user1
    ports:
      - "8092:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-innovatech:3306/innovadb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - db-innovatech

volumes:
  db_data_innovatech:
